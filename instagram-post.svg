<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#5C7A63" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5C7A63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette2" cx="85%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#C98A4B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C98A4B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="#EEF2ED"/>
  <rect width="1080" height="1080" fill="url(#vignette)"/>
  <rect width="1080" height="1080" fill="url(#vignette2)"/>

  <text x="90" y="110" font-family="IBM Plex Mono, monospace" font-size="20" letter-spacing="3" fill="#55645A">FOCUS RING</text>
  <text x="990" y="110" font-family="IBM Plex Mono, monospace" font-size="20" letter-spacing="1" fill="#5C7A63" text-anchor="end">20 · 20 · 20</text>
  <line x1="90" y1="140" x2="990" y2="140" stroke="#C7D2C5" stroke-width="1.5"/>

  <!-- lens ring -->
  <g transform="translate(540,460)">
    <circle r="260" fill="none" stroke="#DEE6DC" stroke-width="3"/>
    <circle r="260" fill="none" stroke="#5C7A63" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="980 1634" transform="rotate(-90)"/>

    <!-- distance ticks -->
    <g font-family="IBM Plex Mono, monospace" font-size="18" fill="#55645A">
      <g transform="rotate(0)">
        <line x1="274" y1="0" x2="292" y2="0" stroke="#55645A" stroke-width="2" opacity="0.55"/>
        <text x="318" y="6">1ft</text>
      </g>
      <g transform="rotate(40)">
        <line x1="274" y1="0" x2="292" y2="0" stroke="#55645A" stroke-width="2" opacity="0.55"/>
        <text x="318" y="6" transform="rotate(90 318 6)">3ft</text>
      </g>
      <g transform="rotate(80)">
        <line x1="274" y1="0" x2="292" y2="0" stroke="#55645A" stroke-width="2" opacity="0.55"/>
        <text x="316" y="6" transform="rotate(90 316 6)">6ft</text>
      </g>
      <g transform="rotate(150)">
        <line x1="274" y1="0" x2="292" y2="0" stroke="#55645A" stroke-width="2" opacity="0.55"/>
        <text x="316" y="6" transform="rotate(-90 316 6)">10ft</text>
      </g>
      <g transform="rotate(250)">
        <line x1="274" y1="0" x2="292" y2="0" stroke="#55645A" stroke-width="2" opacity="0.55"/>
        <text x="316" y="6" transform="rotate(-90 316 6)">15ft</text>
      </g>
      <g transform="rotate(330)">
        <line x1="270" y1="0" x2="296" y2="0" stroke="#C98A4B" stroke-width="4"/>
        <text x="322" y="8" fill="#C98A4B" font-weight="600" transform="rotate(90 322 8)">20ft</text>
      </g>
    </g>

    <text x="0" y="-10" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="120" fill="#1F2A22">20</text>
    <text x="0" y="46" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="2" fill="#C98A4B">SECONDS · 20 FEET AWAY</text>
  </g>

  <text x="540" y="860" text-anchor="middle" font-family="Inter, sans-serif" font-size="30" fill="#1F2A22">Every 20 minutes, look 20 feet away for 20 seconds.</text>
  <text x="540" y="900" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#55645A">A native overlay + browser timer built for actually following through.</text>

  <line x1="90" y1="960" x2="990" y2="960" stroke="#C7D2C5" stroke-width="1.5"/>
  <text x="90" y="995" font-family="IBM Plex Mono, monospace" font-size="16" fill="#55645A">github.com/&lt;you&gt;/focus-ring</text>
  <text x="990" y="995" font-family="IBM Plex Mono, monospace" font-size="16" fill="#55645A" text-anchor="end">open source · MIT</text>
</svg>
